name: Build libbox.aar

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要编译的官方版本 (填 dev-next 或 v1.8.11 等)'
        required: true
        default: 'dev-next'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取官方源码
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ github.event.inputs.version }}

      - name: 2. 配置 Go 语言环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 3. 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. 开始编译 (连接 NDK)
        run: |
          # 将 Go 工具链加入环境变量
          export PATH=$PATH:$(go env GOPATH)/bin
          # 强制指定 GitHub 服务器自带的安卓 NDK 路径
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          make lib_install
          make lib_android

      - name: 5. 提取打包好的文件
        uses: actions/upload-artifact@v4
        with:
          name: libbox-${{ github.event.inputs.version }}-aar
          path: libbox.aar
