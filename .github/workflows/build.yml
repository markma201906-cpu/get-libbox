name: Build libbox.aar

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: v1.13.3)'
        required: true
        default: 'v1.13.3'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取源码
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ github.event.inputs.version }}

      - name: 2. 配置 Go 环境 (黄金稳定版)
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: 3. 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. 物理清理系统干扰 NDK
        run: |
          echo "删除系统自带高版本 NDK..."
          sudo rm -rf $ANDROID_HOME/ndk/*

      - name: 5. 强制安装稳定版 NDK (r25c)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          local-cache: true

      - name: 6. 开始编译 (精确编译纯 64 位)
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          export CGO_ENABLED=1
          
          echo "修改编译目标为纯 64 位 (arm64)..."
          sed -i 's/-target android/-target android\/arm64/g' Makefile
          
          # 打印修改后的 Makefile 确认一下
          echo "当前的编译指令为："
          grep "build_libbox" Makefile
          
          make lib_install
          make lib_android

      - name: 7. 提取产物 (全盘雷达搜索模式)
        uses: actions/upload-artifact@v4
        with:
          name: libbox-${{ github.event.inputs.version }}-aar
          path: '**/*.aar'
