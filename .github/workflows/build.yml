name: Build libbox.aar

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: v1.8.11)'
        required: true
        default: 'v1.8.11'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取源码
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ github.event.inputs.version }}

      - name: 2. 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 3. 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. 开始编译 (修复 NDK 环境)
        run: |
          # 将 Go 工具链加入系统路径
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # 直接执行编译！(删除了之前那行错误干扰 NDK 的代码，使用系统默认的 NDK)
          make lib_install
          make lib_android

      - name: 5. 提取产物
        uses: actions/upload-artifact@v4
        with:
          name: libbox-${{ github.event.inputs.version }}-aar
          path: libbox.aar
