name: Build libbox.aar

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要编译的官方版本 (如: v1.8.11 或 main)'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取官方源码
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ github.event.inputs.version }}

      - name: 2. 配置 Go 语言环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # 官方最新的环境要求

      - name: 3. 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. 开始编译 (底层调用 NDK)
        run: |
          # 链接 GitHub 免费服务器自带的 Android NDK
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          # 安装 GoMobile 编译工具
          make lib_install
          # 核心步骤：将核心代码打包成安卓 aar
          make lib_android

      - name: 5. 提取打包好的文件
        uses: actions/upload-artifact@v4
        with:
          name: libbox-${{ github.event.inputs.version }}-aar
          path: libbox.aar
