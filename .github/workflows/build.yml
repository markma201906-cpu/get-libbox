name: Build libbox.aar

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: v1.13.3)'
        required: true
        default: 'v1.13.3'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取源码
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ github.event.inputs.version }}

      - name: 2. 配置 Go 环境 (恢复使用 1.24 适配新版源码)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: 3. 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. 物理清理系统干扰 NDK
        run: |
          echo "釜底抽薪：删除系统自带的高版本 NDK，防止 gomobile 偷偷抓取报错..."
          sudo rm -rf $ANDROID_HOME/ndk/*

      - name: 5. 强制安装全新稳定版 NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          local-cache: true

      - name: 6. 开始编译
        run: |
          # 将 Go 工具链加入系统路径
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # 绑定干净的 NDK 路径
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          echo "NDK 路径已设置为: $ANDROID_NDK_HOME"
          
          # 禁用一些可能导致冲突的 CGO 特性，保证跨平台编译成功
          export CGO_ENABLED=1
          
          # 执行编译
          make lib_install
          make lib_android

      - name: 7. 提取产物
        uses: actions/upload-artifact@v4
        with:
          name: libbox-${{ github.event.inputs.version }}-aar
          path: libbox.aar
